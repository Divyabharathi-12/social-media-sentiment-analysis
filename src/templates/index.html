
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media Sentiment Analyzer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #121212;          /* Sleek Dark Charcoal */
            --card-bg: #1e1e1e;           /* Slightly lighter charcoal for contrast */
            --text-main: #f5f5f7;         /* Crisp off-white */
            --text-muted: #a1a1a6;        /* Subtle gray for secondary text */
            --primary-gold: #d4af37;      /* Beautiful Metallic Gold */
            --gold-hover: #f3cf65;        /* Brighter gold on hover */
            --border-radius: 12px;
            
            /* Glassmorphism & Soft Glows */
            --card-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            --border-glow: rgba(212, 175, 55, 0.15);
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 550px;
            background: var(--card-bg);
            padding: 35px;
            border-radius: var(--border-radius);
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        h1 {
            text-align: center;
            color: var(--primary-gold);
            letter-spacing: -0.5px;
            margin-top: 0;
            margin-bottom: 30px;
            font-size: 26px;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 500;
            font-size: 14px;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        textarea {
            width: 100%;
            height: 130px;
            padding: 16px;
            box-sizing: border-box;
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--border-radius);
            color: var(--text-main);
            resize: none;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-gold);
            background-color: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 15px var(--border-glow);
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, var(--primary-gold), #aa8413);
            color: #121212;
            padding: 14px;
            border: none;
            border-radius: var(--border-radius);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
        }

        button:hover {
            background: linear-gradient(135deg, var(--gold-hover), var(--primary-gold));
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.3);
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .result-box {
            margin-top: 25px;
            padding: 16px;
            border-radius: var(--border-radius);
            text-align: center;
            font-weight: 600;
            font-size: 18px;
            display: none;
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Neon-tinted Glows for Sentiments */
        .positive { 
            background-color: rgba(46, 204, 113, 0.15); 
            color: #2ecc71; 
            border: 1px solid rgba(46, 204, 113, 0.3);
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.1);
        }
        .negative { 
            background-color: rgba(231, 76, 60, 0.15); 
            color: #e74c3c; 
            border: 1px solid rgba(231, 76, 60, 0.3);
            box-shadow: 0 0 15px rgba(231, 76, 60, 0.1);
        }
        .neutral { 
            background-color: rgba(255, 255, 255, 0.05); 
            color: var(--text-main); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }

        /* Analytics Chart Container */
        .chart-container {
            margin-top: 30px;
            max-height: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
            display: none; /* hidden until first analysis */
        }

        .history-section {
            margin-top: 35px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 25px;
        }

        .history-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 180px;
            overflow-y: auto;
        }

        .history-list::-webkit-scrollbar {
            width: 6px;
        }
        .history-list::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .history-item {
            padding: 12px 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 15px;
            animation: fadeIn 0.3s ease;
        }

        .history-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 75%;
            color: rgba(255, 255, 255, 0.85);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Social Media Sentiment Analyzer</h1>
    
    <div class="form-group">
        <label for="text-input">Enter social media text/tweet:</label>
        <textarea id="text-input" placeholder="Type or paste something here... (e.g., 'I love this product!')"></textarea>
    </div>
    
    <button id="analyze-btn">Analyze Sentiment</button>
    
    <div id="result" class="result-box"></div>

    <div class="chart-container" id="chart-wrap">
        <canvas id="sentimentChart"></canvas>
    </div>

    <div class="history-section">
        <div class="history-title">Recent Analyses</div>
        <ul id="history-list" class="history-list"></ul>
    </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
